server {
    listen 80;
    listen [::]:80;
    server_name qkyfx.com www.qkyfx.com;

    # 让 Let's Encrypt 续签时能访问验证文件
    location ^~ /.well-known/acme-challenge/ {
        allow all;
        root /usr/share/nginx/html;
    }

    # 其他 HTTP 请求强制跳转 HTTPS
    location / {
        return 301 https://www.qkyfx.com$request_uri;
    }
}

# HTTPS 核心服务
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;   # 消除警告的写法

    server_name www.qkyfx.com;

    # SSL 证书路径
    ssl_certificate /etc/letsencrypt/live/www.qkyfx.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.qkyfx.com/privkey.pem;

    # 安全增强（推荐）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    # 代理您的 API 接口
    location ^~ /api/bill-analysis/ {
        client_max_body_size 20M;

        # CORS 跨域配置
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Cookie' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 1728000 always;
            add_header 'Content-Type' 'text/plain; charset=utf-8' always;
            add_header 'Content-Length' 0 always;
            return 204;
        }

        add_header 'Access-Control-Allow-Origin' '$http_origin' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        # 【关键修正】Docker 内访问宿主机，必须用 172.17.0.1，不能写 127.0.0.1
        proxy_pass http://bill-analysis-server:4000;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}