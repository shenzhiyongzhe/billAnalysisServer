name: Deploy billAnalysisServer

on:
  push:
    branches:
      - main
      - master

# WX_APP_ID / WX_APP_SECRET 由服务器 PROJECT_PATH 下的 .env 提供
env:
  PROJECT_PATH: ${{ vars.PROJECT_PATH }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Copy files to Server via SCP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ vars.SSH_HOST }}
        username: ${{ vars.SSH_USERNAME }}
        password: ${{ secrets.SSH_PASSWORD }}
        source: "./**"
        target: ${{ env.PROJECT_PATH }}
        exclude: "node_modules,dist,uploads,.git,.github,.env"

    - name: Execute Remote SSH Commands
      uses: appleboy/ssh-action@v1.0.3
      env:
        DATABASE_URL: ${{ env.DATABASE_URL }}
        PROJECT_PATH: ${{ env.PROJECT_PATH }}
      with:
        host: ${{ vars.SSH_HOST }}
        username: ${{ vars.SSH_USERNAME }}
        password: ${{ secrets.SSH_PASSWORD }}
        envs: DATABASE_URL,PROJECT_PATH
        script: |
          cd "$PROJECT_PATH"

          if [ ! -f .env ]; then
            echo "Error: .env not found in $PROJECT_PATH (need WX_APP_ID, WX_APP_SECRET)"
            exit 1
          fi
          
          # Create upload directory on host if not exists
          mkdir -p uploads
          
          # DATABASE_URL 来自 GitHub Secrets；微信配置由同目录 .env 提供
          export DATABASE_URL="$DATABASE_URL"
          
          # Deploy with Docker Compose
          if command -v docker-compose &> /dev/null; then
            docker-compose down
            docker-compose up -d --build
          else
            docker compose down
            docker compose up -d --build
          fi
