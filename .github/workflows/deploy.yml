# 构建并推送 ghcr.io/<owner>/bill-analysis-server ，再通过 SSH 在服务器拉取并重启。
#
# Variables（Settings → Secrets and variables → Actions → Variables）：
#   服务器1：DEPLOY_HOST, DEPLOY_USER, DEPLOY_PATH
#              DEPLOY_DOCKER_NETWORK   PostgreSQL 在 Docker 容器时设置（如 uniapp-network），宿主机留空
#   服务器2：DEPLOY_HOST_2, DEPLOY_USER_2, DEPLOY_PATH_2（可选，留空则跳过）
#              DEPLOY_DOCKER_NETWORK_2  同上，服务器2专用
#
# Secrets：
#   服务器1：DEPLOY_SSH_KEY
#   服务器2：DEPLOY_SSH_KEY_2（可选，留空则跳过）
#
# 未设置 DEPLOY_HOST 时跳过全部 deploy，仅构建推送镜像。
# 私有镜像需在服务器 docker login ghcr.io（见 deploy/README.md）。

name: Deploy billAnalysisServer

on:
  push:
    branches: [main, master]
    paths:
      - "src/**"
      - "prisma/**"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile"
      - "prisma.config.ts"
      - "docker-compose*.yml"
      - "deploy/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

env:
  CONTEXT_PATH: ${{ vars.DOCKER_CONTEXT || '.' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_full_sha: ${{ steps.resolve.outputs.image_full_sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve ghcr.io image name (lowercase owner)
        id: resolve
        run: |
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          IMAGE_NAME="ghcr.io/${OWNER_LC}/bill-analysis-server"
          echo "IMAGE_NAME=${IMAGE_NAME}" >> "$GITHUB_ENV"
          echo "image_full_sha=${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ env.CONTEXT_PATH }}
          file: ${{ env.CONTEXT_PATH }}/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  # 并行部署到服务器1（始终执行）
  deploy-server-1:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      vars.DEPLOY_HOST != ''
    steps:
      - uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_FULL_SHA: ${{ needs.build-and-push.outputs.image_full_sha }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          # PostgreSQL 在 Docker 容器时需要：设置 DEPLOY_DOCKER_NETWORK 为 Docker 网络名（如 uniapp-network）
          # PostgreSQL 在宿主机时留空
          DOCKER_NETWORK: ${{ vars.DEPLOY_DOCKER_NETWORK }}
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: IMAGE_FULL_SHA,DEPLOY_PATH,DOCKER_NETWORK
          script_stop: true
          script: |
            set -exo pipefail
            cd "${DEPLOY_PATH}"
            if [ ! -f .env ]; then
              echo "Error: .env not found in ${DEPLOY_PATH}"
              exit 1
            fi
            export DOCKER_IMAGE="${IMAGE_FULL_SHA}"
            bash deploy/remote-deploy.sh

  # 并行部署到服务器2（需配置 DEPLOY_HOST_2 等变量）
  deploy-server-2:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      vars.DEPLOY_HOST_2 != ''
    steps:
      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.DEPLOY_HOST_2 }}
          username: ${{ vars.DEPLOY_USER_2 }}
          key: ${{ secrets.DEPLOY_SSH_KEY_2 }}
          script_stop: true
          script: |
            set -exo pipefail
            cd "${{ vars.DEPLOY_PATH_2 }}"
            if [ ! -f .env ]; then
              echo "Error: .env not found in ${{ vars.DEPLOY_PATH_2 }}"
              exit 1
            fi
            # 直接在 script 中 export，避免 envs 机制传递空值的歧义
            export DOCKER_IMAGE="${{ needs.build-and-push.outputs.image_full_sha }}"
            export DOCKER_NETWORK="${{ vars.DEPLOY_DOCKER_NETWORK_2 }}"
            echo "[workflow] DOCKER_NETWORK=${DOCKER_NETWORK}" >&2
            bash deploy/remote-deploy.sh
