# 本地开发：构建并运行（PostgreSQL 建议在宿主机，.env 中 DATABASE_URL 勿用 localhost）
services:
  app:
    build: .
    image: bill-analysis-server:local
    container_name: bill-analysis-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PORT:-4000}:4000"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: "4000"
      NODE_ENV: production
      API_PREFIX: ${API_PREFIX:-api/bill-analysis}
    volumes:
      - uploads_data:/usr/src/app/uploads
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:4000/',r=>{r.resume();process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  uploads_data:
