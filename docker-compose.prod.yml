# 生产环境：仅拉取镜像运行（由 CI 注入 DOCKER_IMAGE）
# 用法：export DOCKER_IMAGE=ghcr.io/<owner>/bill-analysis-server:latest
#      docker compose -f docker-compose.prod.yml up -d
# .env 中 DATABASE_URL 主机勿用 localhost（除非 PostgreSQL 真跑在同一容器内）
services:
  app:
    image: ${DOCKER_IMAGE:?Set DOCKER_IMAGE to ghcr.io/.../bill-analysis-server:tag}
    container_name: bill-analysis-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PORT:-4000}:4000"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: "4000"
      NODE_ENV: production
      API_PREFIX: ${API_PREFIX:-api/bill-analysis}
    volumes:
      # 绑定宿主机目录，便于 Nginx 通过 /uploads/bill-analysis/ 直接读文件
      - ./uploads:/usr/src/app/uploads
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:4000/',r=>{r.resume();process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
